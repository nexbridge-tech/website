  eyebrow: "Vietnam ⇆ Global Technology Network"
  headline_before: "Connecting"
  headline_accent: "Global Technology"
  headline_after: "with Industrial Excellence"
  lead: "NexBridge helps Vietnamese manufacturers and system integrators solve real engineering problems by matching them with the right components, materials and technology partners — from semiconductors to thermal materials to automation."
  cta_primary_text: "Talk To An Engineer"
  cta_primary_link: "contact.html"
  cta_secondary_text: "Explore Solutions"
  cta_secondary_link: "solutions.html"
