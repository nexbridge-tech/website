design_services:
  eyebrow: "ENGINEERING SUPPORT"
  title: "Beyond Sourcing — Real Design Support"
  subtitle: "We don't just connect you to parts. Our team works alongside yours on the engineering itself."
  cards:
    - image: "assets/images/design-pcba.jpg"
      title: "PCBA Design Support"
      description: "From schematic capture to layout, we help you design PCBAs that are manufacturable, testable and ready to scale — not just functional on a bench."
    - image: "assets/images/design-review.jpg"
      title: "Design Review"
      description: "A second set of expert eyes before you commit to tooling. We catch signal integrity, thermal and DFM issues while they're still cheap to fix."
    - image: "assets/images/design-aspice.jpg"
      title: "ASPICE Process Alignment"
      description: "For automotive programs, we help align your development process with Automotive SPICE requirements from the start — not as an audit afterthought."

